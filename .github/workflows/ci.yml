name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check sagsbench tests
      - name: Test
        run: pytest -q
      - name: Validate leaderboard submissions
        run: |
          for f in leaderboard/submissions/*.json; do
            python -m sagsbench.cli.main leaderboard validate "$f"
          done
